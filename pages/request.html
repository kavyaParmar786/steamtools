<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Game | STEAMTOOLS</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="subpage">
    <nav>
        <div class="logo"><a href="../index.html">STEAMTOOLS</a></div>
        <ul class="nav-links">
            <li><a href="store.html">Store</a></li>
            <li><a href="fixes.html">Fixes</a></li>
            <li><a href="drops.html">Drops</a></li>
            <li><a href="request.html" class="active">Request</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="terminal-card">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="terminal-title">Vault Request Terminal</span>
            </div>
            <div class="terminal-body">
                <p class="cmd-text">> Initializing connection to STEAMTOOLS_API...</p>
                <p class="cmd-text">> Connection established. Enter game request details.</p>
                
                <form id="request-form">
                    <div class="input-group">
                        <label>GAME TITLE</label>
                        <input type="text" placeholder="e.g. Cyberpunk 2077" required>
                    </div>
                    <div class="input-group">
                        <label>STEAM APP ID (OPTIONAL)</label>
                        <input type="text" placeholder="e.g. 1091500">
                    </div>
                    <button type="submit" class="btn-main">TRANSMIT REQUEST</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="../app.js"></script>
</body>
</html>
