<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request — STRAW HAT</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../extras.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-transition-overlay"></div>
<div class="global-doodles" aria-hidden="true"></div>

<nav class="nav-main">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">STRAW<span>HAT</span></a>
    <div class="nav-links">
      <a href="store.html">Store</a>
      <a href="drops.html">Drops</a>
      <a href="fixes.html">Fixes</a>
      <a href="request.html" class="active">Request</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</nav>

<div class="container" style="padding-top: 140px; min-height: 80vh; position: relative; z-index: 1;">
  <div style="max-width: 600px; margin: 0 auto;">
    <h1 class="display-font" style="font-size: 56px; line-height: 1; margin-bottom: 8px;">SUBMIT A <span class="text-accent2">REQUEST</span></h1>
    <p class="text-dim mb-32" style="font-size: 16px;">Request missing games or technical patches directly to the StrawHat bot network.</p>

    <div class="fix-card visible" style="padding: 40px;">
      <div style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
          <label style="display:block; font-family:var(--font-mono); font-size:11px; color:var(--accent2); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Request Type</label>
          <select id="req-type" style="width:100%; padding:14px 16px; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); border-radius:8px; color:#fff; font-family:var(--font-ui); outline:none;">
            <option value="game">Game Manifest</option>
            <option value="fix">Technical Fix / Patch</option>
          </select>
        </div>

        <div>
          <label style="display:block; font-family:var(--font-mono); font-size:11px; color:var(--accent2); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Game Name</label>
          <input type="text" id="req-title" placeholder="e.g. Ghost of Tsushima" style="width:100%; padding:14px 16px; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); border-radius:8px; color:#fff; font-family:var(--font-ui); outline:none; box-sizing:border-box;">
        </div>

        <div>
          <label style="display:block; font-family:var(--font-mono); font-size:11px; color:var(--accent2); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">Steam App ID</label>
          <input type="text" id="req-appid" placeholder="e.g. 2215430" style="width:100%; padding:14px 16px; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); border-radius:8px; color:#fff; font-family:var(--font-ui); outline:none; box-sizing:border-box;">
        </div>

        <button id="submit-request" class="btn-main-dl" style="width: 100%; justify-content: center; margin-top: 10px;">
          TRANSMIT TO BOT
        </button>
        <p id="req-status" style="font-family: var(--font-mono); font-size: 12px; text-align: center; margin-top: 10px;"></p>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
  document.getElementById('submit-request').addEventListener('click', async () => {
    const session = getSession();
    const status = document.getElementById('req-status');
    const btn = document.getElementById('submit-request');

    if (!session) {
      status.style.color = 'var(--accent2)';
      status.textContent = "❌ You must be logged in via Profile to submit requests.";
      return;
    }

    const type = document.getElementById('req-type').value;
    const title = document.getElementById('req-title').value.trim();
    const appId = document.getElementById('req-appid').value.trim();

    if (!title || !appId || !/^\d+$/.test(appId)) {
      status.style.color = 'var(--accent2)';
      status.textContent = "❌ Please enter a valid Game Name and numeric App ID.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "TRANSMITTING...";
    status.textContent = "";

    try {
      const response = await fetch('https://steam-dx4q.onrender.com/api/request-game', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer Dhyey@123'
        },
        body: JSON.stringify({
          appId: appId,
          userId: session.id,
          username: session.username,
          gameName: title,
          isFix: type === 'fix'
        })
      });

      if (response.ok) {
        status.style.color = '#4ade80';
        status.textContent = "✓ Request transmitted securely to Discord.";
        document.getElementById('req-title').value = '';
        document.getElementById('req-appid').value = '';
      } else {
        throw new Error('Bot rejected transmission');
      }
    } catch (err) {
      status.style.color = 'var(--accent2)';
      status.textContent = "❌ Server error. Could not connect to bot.";
    } finally {
      btn.disabled = false;
      btn.textContent = "TRANSMIT TO BOT";
    }
  });
</script>
</body>
</html>
