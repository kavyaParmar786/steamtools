<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixes & Patches | STEAMTOOLS</title>
  <meta name="description" content="Performance patches, optimization guides, and community fixes for common game issues.">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../modal.css">
  <link rel="stylesheet" href="../extras.css">
</head>
<body>
<canvas id="webgl-bg"></canvas>

<div class="di-wrapper">
  <nav id="main-nav">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">ST</div>
      <span class="nav-logo-text">STEAM<span>TOOLS</span></span>
    </a>
    <div class="nav-sep"></div>
    <ul class="nav-links">
      <li><a href="store.html">Store</a></li>
      <li><a href="fixes.html" class="active">Fixes</a></li>
      <li><a href="drops.html">Drops</a></li>
      <li><a href="request.html">Request</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-sep"></div>
    <div class="nav-actions">
      <a href="profile.html" class="nav-btn-ghost">Sign In</a>
      <a href="#" class="nav-btn-primary">Discord</a>
    </div>
  </nav>
</div>

<div class="subpage-wrap">
  <div class="container">
    <div class="page-hero reveal">
      <span class="page-hero-tag">// COMMUNITY PATCHES</span>
      <h1>TECHNICAL <span class="text-gradient">FIXES</span></h1>
      <p>Performance patches, optimization guides, and community fixes for common game issues.</p>
    </div>

    <!-- Search -->
    <div class="store-controls reveal" style="margin-bottom:24px">
      <input type="text" id="fix-search" placeholder="🔍  Search fixes...">
      <div class="filter-strip">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="performance">Performance</button>
        <button class="filter-btn" data-cat="crash">Crash Fix</button>
        <button class="filter-btn" data-cat="audio">Audio</button>
      </div>
    </div>

    <div class="fixes-grid" id="fixes-grid"></div>
  </div>
</div>

</div>

<script src="../shared.js"></script>
<script>
let currentCat = 'all';
let searchTerm = '';

function renderFixes() {
  const grid = document.getElementById('fixes-grid');
  if (!grid) return;

  let data = currentCat === 'all' ? fixes : fixes.filter(f => f.cat === currentCat);
  if (searchTerm) {
    data = data.filter(f => f.title.toLowerCase().includes(searchTerm) || f.game.toLowerCase().includes(searchTerm));
  }
  
  grid.innerHTML = data.map((f, i) => `
    <div class="fix-card reveal visible" style="transition-delay:${i * 0.05}s">
      <div class="fix-header">
        <h3>${f.title}</h3>
        ${f.badge ? `<span class="badge-new">${f.badge}</span>` : ''}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <span class="fix-game-tag">${f.game}</span>
        <span class="fix-version-tag">${f.version}</span>
      </div>
      <p>${f.desc}</p>
      <button class="btn-apply" onclick="applyFix(this)">Apply Fix</button>
    </div>
  `).join('');
}

function applyFix(btn) {
  btn.disabled = true;
  btn.textContent = 'Applying...';
  btn.classList.add('applying');
  setTimeout(() => {
    btn.textContent = '✓ Applied';
    btn.classList.remove('applying');
    btn.classList.add('applied');
  }, 1500);
}

document.addEventListener('DOMContentLoaded', () => {
  renderFixes();
  const searchInput = document.getElementById('fix-search');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      searchTerm = e.target.value.toLowerCase();
      renderFixes();
    });
  }
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderFixes();
    });
  });
});
</script>
</body>
</html>
