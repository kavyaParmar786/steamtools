<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — STRAW HAT</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../extras.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    .admin-card {
      background: rgba(3,5,8,0.7); backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 40px; margin-top: 40px;
    }
    .log-box {
      background: #000; border: 1px solid var(--glass-border);
      border-radius: 8px; padding: 16px; font-family: var(--font-mono);
      font-size: 12px; height: 300px; overflow-y: auto; color: var(--text-50);
    }
    .log-system { color: #00f0ff; }
  </style>
</head>
<body>
<div class="page-transition-overlay"></div>

<div class="container" style="padding-top: 80px; min-height: 100vh; position: relative; z-index: 1;">
  <div class="admin-card">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--glass-border); padding-bottom:20px; margin-bottom:20px;">
      <div>
        <h1 class="display-font" style="font-size: 40px; margin:0; color:var(--accent2)">STAFF OVERRIDE</h1>
        <p class="text-dim" style="font-family:var(--font-mono); font-size:11px; text-transform:uppercase;">Network Administration Hub</p>
      </div>
      <a href="../index.html" class="btn-main-dl" style="background:transparent; border:1px solid var(--glass-border); color:var(--text-80)">Exit Panel</a>
    </div>

    <div style="display: grid; grid-template-columns: 1fr; gap: 40px;">
      <div>
        <h3 class="section-tag mb-16">Live Bot Request Queue</h3>
        <div class="log-box" id="admin-queue">
          <div class="log-system">Connecting to live MongoDB cluster...</div>
        </div>
      </div>

      <div>
        <h3 class="section-tag mb-16">Local Systems</h3>
        <div style="display: flex; gap: 16px;">
          <button id="sync-btn" class="btn-main-dl">Force Discovery Sync</button>
          <button id="clear-cache" class="btn-main-dl" style="background:transparent; border:1px solid var(--accent2); color:var(--accent2)">Wipe Local Cache</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
  // 🛡️ THE GATEKEEPER: Secure Role Check
  document.addEventListener('DOMContentLoaded', () => {
    const session = getSession();
    if (!session || !session.isStaff) {
      document.body.innerHTML = `
        <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#030508;">
          <h1 class="display-font" style="font-size:80px; color:#ff4747; margin:0;">ACCESS DENIED</h1>
          <p class="text-dim" style="font-family:var(--font-mono);">Role 1496378683475099657 missing. Terminating connection.</p>
        </div>
      `;
      setTimeout(() => { window.location.href = '../index.html'; }, 2500);
      return;
    }

    // Load Live Requests from MongoDB via Bot
    async function loadRequests() {
      const box = document.getElementById('admin-queue');
      try {
        const res = await fetch('https://steam-dx4q.onrender.com/api/admin/requests');
        const data = await res.json();
        if (data.success) {
          box.innerHTML = data.data.length ? data.data.map(r => `<div><span style="color:#4ade80">[${r.type.toUpperCase()}]</span> AppID: ${r.appId} - Requested by: ${r.requesterId}</div>`).join('') : '<div style="color:var(--text-30)">No active requests in queue.</div>';
        }
      } catch (err) {
        box.innerHTML = `<div style="color:var(--accent2)">Failed to fetch live queue from Render bot.</div>`;
      }
    }
    loadRequests();

    // Local Tools
    document.getElementById('sync-btn').addEventListener('click', async () => {
      document.getElementById('sync-btn').textContent = "Syncing...";
      await loadFullCatalog();
      document.getElementById('sync-btn').textContent = "Force Discovery Sync";
      alert("Local discovery cache synced successfully.");
    });

    document.getElementById('clear-cache').addEventListener('click', () => {
      localStorage.clear();
      alert("Local storage wiped. Please log back in.");
      window.location.href = '../index.html';
    });
  });
</script>
</body>
</html>
