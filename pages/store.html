<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store | STEAMTOOLS</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../modal.css">
  <link rel="stylesheet" href="../extras.css">
</head>
<body>
<canvas id="webgl-bg"></canvas>

<div class="di-wrapper">
  <nav id="main-nav">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">ST</div>
      <span class="nav-logo-text">STEAM<span>TOOLS</span></span>
    </a>
    <div class="nav-sep"></div>
    <ul class="nav-links">
      <li><a href="store.html" class="active">Store</a></li>
      <li><a href="fixes.html">Fixes</a></li>
      <li><a href="drops.html">Drops</a></li>
      <li><a href="request.html">Request</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-sep"></div>
    <div class="nav-actions">
      <a href="profile.html" class="nav-btn-ghost">Sign In</a>
      <a href="#" class="nav-btn-primary">Discord</a>
    </div>
  </nav>
</div>

<div class="subpage-wrap">
  <div class="container">
    <div class="page-hero reveal">
      <span class="page-hero-tag">// THE COLLECTION</span>
      <h1 class="section-title">THE VAULT <span class="text-gradient">STORE</span></h1>
      <p class="hero-sub">Access the largest collection of verified Steam manifests. Powered by GameGen API.</p>
    </div>

    <div class="store-controls reveal">
      <input type="text" id="store-search" placeholder="🔍  Search the archive...">
      <div class="filter-strip">
        <button class="filter-btn active" data-filter="all">All Games</button>
        <button class="filter-btn" data-filter="aaa">AAA</button>
        <button class="filter-btn" data-filter="indie">Indie</button>
        <button class="filter-btn" data-filter="survival">Survival</button>
      </div>
    </div>

    <div class="game-grid" id="store-grid"></div>

    <div class="load-more-wrap reveal" style="text-align:center;margin:80px 0">
      <div class="api-status" id="api-status">
        <span class="tag-dot"></span>
        <span>GameGen API · Connected · 45 Titles Loaded</span>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
let currentFilter = 'all';
let currentSearch = '';

function renderStore() {
  const grid = document.getElementById('store-grid');
  if (!grid) return;

  let data = currentFilter === 'all' ? CATALOG : CATALOG.filter(g => g.cat === currentFilter);
  if (currentSearch) {
    const query = currentSearch.toLowerCase();
    data = data.filter(g => g.name.toLowerCase().includes(query) || g.tag.toLowerCase().includes(query));
  }

  grid.innerHTML = '';
  data.forEach((game, i) => {
    const card = document.createElement('div');
    card.className = 'game-card reveal visible';
    card.style.transitionDelay = `${i * 0.04}s`;
    card.onclick = () => window.location.href = `details.html?id=${game.id}`;
    card.innerHTML = `
      <div class="game-img">
        <img src="${STEAMTOOLS_CONFIG.STEAM_IMG}/${game.id}/library_600x900_2x.jpg" alt="${game.name}" loading="lazy"
             onerror="this.src='https://placehold.co/300x450/0a0f1a/6b9ef8?text=${encodeURIComponent(game.name)}'">
        <span class="game-status-badge">VERIFIED</span>
        <div class="game-overlay"><button class="btn-get">View Details ↗</button></div>
      </div>
      <div class="game-info"><h3>${game.name}</h3><span class="game-tag">${game.tag}</span></div>`;
    grid.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderStore();
  const searchInput = document.getElementById('store-search');
  if (searchInput) {
    searchInput.addEventListener('input', e => { 
      currentSearch = e.target.value; 
      renderStore(); 
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderStore();
    });
  });
});
</script>
</body>
</html>
