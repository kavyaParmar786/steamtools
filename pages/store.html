<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Store — Straw Hat Vault</title>
  <link rel="icon" href="../icon.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../extras.css">
  <link rel="stylesheet" href="../modal.css">
  <style>
    /* ── SEARCH RESULTS DROPDOWN ── */
    #search-results {
      position:absolute;top:calc(100% + 8px);left:0;right:0;
      background:#0d1016;border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;overflow:hidden;z-index:200;
      box-shadow:0 20px 60px rgba(0,0,0,0.8);
      max-height:420px;overflow-y:auto;
      display:none;
    }
    #search-results.open { display:block; }
    #search-results::-webkit-scrollbar { width:4px; }
    #search-results::-webkit-scrollbar-thumb { background:rgba(255,106,0,0.3);border-radius:2px; }

    .sr-item {
      display:flex;align-items:center;gap:12px;
      padding:10px 14px;cursor:pointer;
      border-bottom:1px solid rgba(255,255,255,0.04);
      transition:background 0.15s;
    }
    .sr-item:hover { background:rgba(255,255,255,0.05); }
    .sr-item:last-child { border-bottom:none; }
    .sr-img { width:56px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#060810; }
    .sr-name { font-family:var(--font-ui);font-size:13px;font-weight:600;color:rgba(255,255,255,0.9); }
    .sr-id   { font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px; }
    .sr-searching { padding:16px 14px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.3);text-align:center; }

    /* ── INFINITE SCROLL SENTINEL ── */
    #scroll-sentinel { height:1px;margin-top:20px; }

    /* ── LOADING MORE ── */
    #loading-more {
      display:none;text-align:center;padding:32px;
      font-family:var(--font-mono);font-size:11px;
      color:rgba(255,255,255,0.3);letter-spacing:2px;
    }
    #loading-more.active { display:block; }

    /* ── GAME CARD OVERLAY ── */
    .game-card-overlay {
      position:absolute;inset:0;background:rgba(0,0,0,0.7);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.25s;
    }
    .game-card:hover .game-card-overlay { opacity:1; }

    /* ── FILTER ACTIVE ── */
    .filter-btn.active {
      background:var(--accent);color:#fff;
      border-color:var(--accent);
    }

    /* ── END OF RESULTS ── */
    #end-msg {
      display:none;text-align:center;padding:40px;
      font-family:var(--font-mono);font-size:10px;
      color:rgba(255,255,255,0.2);letter-spacing:3px;text-transform:uppercase;
    }
  </style>
</head>
<body>
<div class="page-transition-overlay"></div>

<div class="global-doodles" aria-hidden="true">
  <svg class="gdoodle gd1" width="72" height="72" viewBox="0 0 72 72" fill="none"><circle cx="36" cy="36" r="33" stroke="#fff" stroke-width="1.2" stroke-dasharray="7 5"></circle><circle cx="36" cy="36" r="20" stroke="#fff" stroke-width="0.8" stroke-dasharray="4 4"></circle><line x1="18" y1="36" x2="54" y2="36" stroke="#fff" stroke-width="0.9"></line><line x1="36" y1="18" x2="36" y2="54" stroke="#fff" stroke-width="0.9"></line></svg>
  <svg class="gdoodle gd2" width="88" height="88" viewBox="0 0 88 88" fill="none"><rect x="6" y="6" width="76" height="76" rx="8" stroke="#fff" stroke-width="1" stroke-dasharray="8 5"></rect><rect x="20" y="20" width="48" height="48" rx="4" stroke="#fff" stroke-width="0.7" stroke-dasharray="5 4"></rect></svg>
  <svg class="gdoodle gd3" width="60" height="60" viewBox="0 0 60 60" fill="none"><polygon points="30,4 56,48 4,48" stroke="#fff" stroke-width="1.2" fill="none"></polygon></svg>
  <svg class="gdoodle gd4" width="78" height="78" viewBox="0 0 78 78" fill="none"><path d="M39 6 L72 39 L39 72 L6 39 Z" stroke="#fff" stroke-width="1.2" stroke-dasharray="6 4" fill="none"></path></svg>
</div>

<video class="bg-video" autoplay loop muted playsinline><source src="../background.mp4" type="video/mp4"></video>
<canvas id="webgl-bg"></canvas>
<div class="bg-overlay"></div>

<!-- NAV -->
<div class="di-wrapper"></div>

<div class="subpage-wrap">
  <div class="container">
    <div class="page-hero reveal">
      <span class="page-hero-tag">// THE VAULT</span>
      <h1>GAME <span class="text-gradient">STORE</span></h1>
      <p>The entire Steam library. Every game searches our vault on download.</p>
    </div>

    <!-- Search + Filters -->
    <div class="store-controls reveal">
      <div style="position:relative;max-width:420px;flex:1;min-width:200px">
        <span style="position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text-30);display:flex;pointer-events:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </span>
        <input type="text" id="store-search" placeholder="Search any game by name or Steam ID..." autocomplete="off"
          style="padding-left:44px;padding-right:44px">
        <span id="search-clear" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-30);display:none;font-size:16px;line-height:1" onclick="clearSearch()">✕</span>
        <!-- Dropdown -->
        <div id="search-results"></div>
      </div>
      <div class="filter-strip" id="filter-strip">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="aaa">Popular</button>
        <button class="filter-btn" data-filter="new">New</button>
        <button class="filter-btn" data-filter="indie">Indie</button>
        <button class="filter-btn" data-filter="survival">Survival</button>
      </div>
    </div>

    <!-- Game Grid -->
    <div class="game-grid" id="game-grid" style="min-height:300px"></div>

    <!-- Infinite scroll sentinel -->
    <div id="scroll-sentinel"></div>
    <div id="loading-more"><span class="btn-spinner"></span> &nbsp;LOADING MORE...</div>
    <div id="end-msg">— END OF RESULTS —</div>
  </div>
</div>

<!-- GAME MODAL -->
<div class="game-modal-overlay" id="game-modal-overlay" style="display:none" onclick="if(event.target===this)closeGameModal()">
  <div class="game-modal" id="game-modal">
    <button class="modal-close" onclick="closeGameModal()">✕</button>
    <div id="modal-inner">
      <div style="display:flex;align-items:center;justify-content:center;height:300px">
        <span class="btn-spinner" style="width:32px;height:32px;border-width:3px"></span>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script src="../ocean.js"></script>
<script>
/* ── STATE ─────────────────────────────────────── */
let currentFilter  = 'all';
let isLoadingMore  = false;
let searchMode     = false;
let searchTimeout  = null;
let searchResults  = [];
let noMorePages    = false;
let loadedCount    = 0;

// Popular curated list to show first
const POPULAR_IDS = [
  '271590','1174180','1245620','1091500','553850','1086940',
  '730','252490','892970','1593500','1677740','2215430',
  '1172470','1817070','814380','1151640','413150','1145360',
  '2050650','1938090','570','1446780','1551360','1794680',
];
let popularOffset = 0;

/* ── INIT ─────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  buildNav('store');

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      resetAndLoad();
    });
  });

  // Search input
  const searchInput = document.getElementById('store-search');
  const resultsBox  = document.getElementById('search-results');
  const clearBtn    = document.getElementById('search-clear');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    clearBtn.style.display = q ? 'block' : 'none';
    clearTimeout(searchTimeout);
    if (!q) {
      resultsBox.classList.remove('open');
      if (searchMode) { searchMode = false; resetAndLoad(); }
      return;
    }
    resultsBox.innerHTML = '<div class="sr-searching">Searching Steam...</div>';
    resultsBox.classList.add('open');
    searchTimeout = setTimeout(() => doSearch(q), 350);
  });

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#store-search') && !e.target.closest('#search-results')) {
      resultsBox.classList.remove('open');
    }
  });

  // Load initial games
  await loadMoreGames();

  // Intersection observer for infinite scroll
  const sentinel = document.getElementById('scroll-sentinel');
  const io = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !isLoadingMore && !searchMode && !noMorePages) {
      await loadMoreGames();
    }
  }, { rootMargin: '200px' });
  io.observe(sentinel);
});

/* ── LOAD MORE GAMES ─────────────────────────────── */
async function loadMoreGames() {
  if (isLoadingMore || noMorePages) return;
  isLoadingMore = true;
  document.getElementById('loading-more').classList.add('active');

  let apps = [];

  if (currentFilter === 'all' || currentFilter === 'new') {
    // Fetch from Steam's full applist
    apps = await getNextAppPage();
    if (!apps || apps.length < 48) noMorePages = true;
    // Convert to game card format
    apps = apps.map(a => ({ id: String(a.appid), name: a.name, tag: '', cat: 'all' }));
  } else if (currentFilter === 'aaa' || currentFilter === 'popular') {
    // Use our popular curated list
    const chunk = POPULAR_IDS.slice(popularOffset, popularOffset + 12);
    popularOffset += 12;
    if (popularOffset >= POPULAR_IDS.length) noMorePages = true;
    apps = chunk.map(id => {
      const c = CATALOG.find(x => x.id === id);
      return { id, name: c?.name || `Game ${id}`, tag: c?.tag || '', cat: 'aaa' };
    });
  } else if (currentFilter === 'indie' || currentFilter === 'survival') {
    const filtered = CATALOG.filter(c => c.cat === currentFilter);
    apps = filtered.slice(loadedCount, loadedCount + 12);
    loadedCount += apps.length;
    if (loadedCount >= filtered.length) noMorePages = true;
  }

  renderCards(apps, false);
  isLoadingMore = false;
  document.getElementById('loading-more').classList.remove('active');
  if (noMorePages) document.getElementById('end-msg').style.display = 'block';
}

/* ── SEARCH ─────────────────────────────────────── */
async function doSearch(query) {
  const resultsBox = document.getElementById('search-results');
  const results = await searchSteamApps(query);

  if (!results.length) {
    resultsBox.innerHTML = '<div class="sr-searching">No games found.</div>';
    return;
  }

  resultsBox.innerHTML = results.map(a => `
    <div class="sr-item" onclick="selectSearchResult('${a.appid}','${(a.name||'').replace(/'/g,"\\'")}')">
      <img class="sr-img" src="https://cdn.cloudflare.steamstatic.com/steam/apps/${a.appid}/header.jpg"
        onerror="this.style.background='#0d1016';this.style.opacity='0.3'" alt="${a.name}">
      <div>
        <div class="sr-name">${a.name}</div>
        <div class="sr-id">APP ID: ${a.appid}</div>
      </div>
    </div>
  `).join('');
}

function selectSearchResult(appId, name) {
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('store-search').value = name;
  document.getElementById('search-clear').style.display = 'block';
  // Show single game immediately, open modal
  searchMode = true;
  const grid = document.getElementById('game-grid');
  grid.innerHTML = buildGameCard(appId, name, '');
  document.getElementById('end-msg').style.display = 'none';
  openGameModal(appId, name);
}

function clearSearch() {
  document.getElementById('store-search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').classList.remove('open');
  searchMode = false;
  resetAndLoad();
}

/* ── RESET ─────────────────────────────────────── */
function resetAndLoad() {
  noMorePages   = false;
  isLoadingMore = false;
  loadedCount   = 0;
  popularOffset = 0;
  resetAppListOffset();
  document.getElementById('game-grid').innerHTML = '';
  document.getElementById('end-msg').style.display = 'none';
  loadMoreGames();
}

/* ── RENDER ─────────────────────────────────────── */
function renderCards(apps, replace = false) {
  const grid = document.getElementById('game-grid');
  if (replace) grid.innerHTML = '';
  if (!apps.length) return;
  const frag = document.createDocumentFragment();
  apps.forEach(app => {
    const div = document.createElement('div');
    div.innerHTML = buildGameCard(app.id, app.name, app.tag || '');
    if (div.firstElementChild) frag.appendChild(div.firstElementChild);
  });
  grid.appendChild(frag);
}

/* ── GAME MODAL ─────────────────────────────────── */
async function openGameModal(appId, nameHint) {
  appId = String(appId);
  const overlay = document.getElementById('game-modal-overlay');
  const inner   = document.getElementById('modal-inner');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Show loader
  inner.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:400px;flex-direction:column;gap:16px">
      <span class="btn-spinner" style="width:32px;height:32px;border-width:3px"></span>
      <div style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px">FETCHING DATA...</div>
    </div>`;

  // Fetch data in parallel
  const [details, reviews] = await Promise.all([
    fetchSteamDetails(appId),
    fetchSteamReviews(appId)
  ]);

  const name        = details?.name || nameHint || `Game ${appId}`;
  const desc        = details?.short_description || 'No description available.';
  const headerImg   = `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`;
  const heroImg     = `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/library_hero.jpg`;
  const capsuleImg  = `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/library_600x900.jpg`;
  const screenshots = details?.screenshots?.slice(0,8) || [];
  const genres      = (details?.genres || []).map(g => g.description);
  const cats        = (details?.categories || []).map(c => c.description).slice(0,4);
  const devs        = (details?.developers || []).join(', ') || '—';
  const pubs        = (details?.publishers || []).join(', ') || '—';
  const releaseDate = details?.release_date?.date || '—';

  // Min/max sysreq
  const minReq = details?.pc_requirements?.minimum || '';
  const recReq = details?.pc_requirements?.recommended || '';
  function parseReqs(html) {
    if (!html) return {};
    const m = {};
    const plain = html.replace(/<[^>]+>/g,' ');
    const pairs = [
      ['OS',plain.match(/OS[:\s]+([^\n<]+)/i)],
      ['CPU',plain.match(/Processor[:\s]+([^\n<]+)/i)],
      ['RAM',plain.match(/Memory[:\s]+([^\n<]+)/i)],
      ['GPU',plain.match(/Graphics[:\s]+([^\n<]+)/i)],
      ['Storage',plain.match(/Storage[:\s]+([^\n<]+)/i)],
    ];
    pairs.forEach(([k,v]) => { if(v?.[1]) m[k] = v[1].trim().slice(0,80); });
    return m;
  }
  const minMap = parseReqs(minReq);
  const recMap = parseReqs(recReq);

  // Review score
  let scoreHtml = '';
  if (reviews) {
    const pct  = reviews.total_positive && reviews.total_reviews
      ? Math.round((reviews.total_positive / reviews.total_reviews) * 100) : null;
    const cls  = pct >= 75 ? '' : pct >= 40 ? ' mixed' : ' negative';
    const lbl  = pct >= 75 ? 'Positive' : pct >= 40 ? 'Mixed' : 'Negative';
    const fill = pct >= 75 ? '' : pct >= 40 ? ' mixed' : '';
    if (pct !== null) {
      scoreHtml = `
        <div class="modal-review-row">
          <div>
            <div class="review-score-big${cls}">${pct}%</div>
            <div class="review-label${cls}">${lbl}</div>
            <div class="review-count">${(reviews.total_reviews||0).toLocaleString()} reviews</div>
          </div>
          <div class="review-bar-wrap">
            <div class="review-bar-track">
              <div class="review-bar-fill${fill}" style="width:${pct}%"></div>
            </div>
          </div>
        </div>`;
    }
  }

  // Screenshots strip
  const screensStr = screenshots.length ? `
    <div class="modal-featured-screen" id="modal-main-screen">
      <img id="modal-main-img" src="${screenshots[0].path_full}" alt="screenshot">
    </div>
    <div class="screens-strip">
      ${screenshots.map((s,i) => `
        <img class="screen-thumb${i===0?' active-thumb':''}" src="${s.path_thumbnail}"
          onclick="setMainScreen('${s.path_full}',this)">`
      ).join('')}
    </div>
  ` : `
    <div class="modal-featured-screen">
      <img src="${headerImg}" alt="${name}" style="object-fit:cover;width:100%;height:100%">
    </div>
  `;

  // Sysreq
  const sysreqHtml = (Object.keys(minMap).length || Object.keys(recMap).length) ? `
    <div class="modal-section-title">SYSTEM REQUIREMENTS</div>
    <div class="sysreq-grid">
      <div class="sysreq-card">
        <div class="sysreq-label">MINIMUM</div>
        ${Object.entries(minMap).map(([k,v])=>`<div class="sysreq-row"><span class="sysreq-key">${k}</span><span class="sysreq-val">${v}</span></div>`).join('')}
      </div>
      <div class="sysreq-card">
        <div class="sysreq-label">RECOMMENDED</div>
        ${Object.entries(recMap).map(([k,v])=>`<div class="sysreq-row"><span class="sysreq-key">${k}</span><span class="sysreq-val">${v}</span></div>`).join('')}
      </div>
    </div>
  ` : '';

  inner.innerHTML = `
    <div class="modal-hero">
      <div class="modal-hero-bg" style="background-image:url('${heroImg}'),url('${headerImg}')"></div>
      <div class="modal-hero-keyart">
        <img src="${capsuleImg}" alt="${name}" onerror="this.src='${headerImg}'">
      </div>
      <div class="modal-hero-gradient"></div>
      <div class="modal-hero-badges">
        <span class="modal-hero-badge badge-free">FREE</span>
        ${genres[0] ? `<span class="modal-hero-badge badge-new">${genres[0].toUpperCase()}</span>` : ''}
      </div>
    </div>

    <div class="modal-content">
      <div class="modal-main">
        <div class="modal-title-row">
          <div>
            <div class="modal-title">${name}</div>
            <div class="modal-subtitle">APP ID: ${appId} &nbsp;·&nbsp; ${devs}</div>
          </div>
        </div>
        <div class="modal-tags">
          ${[...genres, ...cats].slice(0,6).map(t=>`<span class="modal-tag">${t}</span>`).join('')}
          <span class="modal-tag">RELEASE: ${releaseDate}</span>
        </div>

        ${scoreHtml}

        <div class="modal-section-title">ABOUT</div>
        <div class="modal-desc-text">${desc}</div>

        <div class="modal-section-title">MEDIA</div>
        ${screensStr}

        ${sysreqHtml}

        <div class="modal-section-title">DETAILS</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px">
          <div style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px">
            <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:6px">Developer</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.8)">${devs}</div>
          </div>
          <div style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px">
            <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:6px">Publisher</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.8)">${pubs}</div>
          </div>
        </div>
      </div>

      <div class="modal-sidebar-wrap">
        <div class="modal-cta-box">
          <div class="modal-cta-cover">
            <img src="${headerImg}" alt="${name}">
          </div>
          <div class="modal-cta-body">
            <div class="modal-cta-price">FREE</div>
            <div class="modal-cta-price-sub">Vault Manifest · via GitHub</div>
            <button class="btn-get-game" id="modal-dl-btn"
              onclick="handleDownload('${appId}','${name.replace(/'/g,"\\'")}',this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              DOWNLOAD MANIFEST
            </button>
            <a href="https://store.steampowered.com/app/${appId}" target="_blank" class="btn-wishlist">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
              View on Steam
            </a>
          </div>
        </div>

        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px">
          <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px">HOW TO INSTALL</div>
          <ol style="padding-left:16px;color:rgba(255,255,255,0.5);font-size:12px;line-height:2;font-family:var(--font-ui)">
            <li>Click "Download Manifest"</li>
            <li>Move .lua to Steam\config\stplug-in\</li>
            <li>Open Steam and install the game</li>
            <li>Launch via Steam normally</li>
          </ol>
        </div>
      </div>
    </div>
  `;
}

function setMainScreen(url, thumb) {
  document.getElementById('modal-main-img').src = url;
  document.querySelectorAll('.screen-thumb').forEach(t => t.classList.remove('active-thumb'));
  thumb.classList.add('active-thumb');
}

function closeGameModal() {
  document.getElementById('game-modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGameModal(); });
</script>
</body>
</html>
