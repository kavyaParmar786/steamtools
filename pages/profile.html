<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — Straw Hat Vault</title>
  <link rel="icon" href="../icon.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../extras.css">
  <style>
    .profile-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }
    .profile-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .profile-banner {
      height: 140px;
      background: linear-gradient(135deg,rgba(88,101,242,0.3),rgba(255,106,0,0.15),rgba(255,61,110,0.2));
      position: relative;
    }
    .profile-avatar-wrap {
      position: absolute;
      bottom: -40px;
      left: 32px;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #0b0d12;
      object-fit: cover;
      background: rgba(88,101,242,0.3);
    }
    .profile-body {
      padding: 52px 32px 28px;
    }
    .profile-name {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 4px;
    }
    .profile-discrim {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(88,101,242,0.15);
      border: 1px solid rgba(88,101,242,0.35);
      color: #7289da;
    }
    .profile-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 28px;
    }
    .profile-stat {
      text-align: center;
      padding: 20px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
    }
    .profile-stat-num {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent);
      display: block;
    }
    .profile-stat-lbl {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      display: block;
    }
    .history-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 24px;
    }
    .history-title {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,106,0,0.15);
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .history-item:last-child { border-bottom: none; }
    .history-img {
      width: 60px;
      height: 34px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .history-game-name {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    .history-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .history-empty {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1.5px;
      text-align: center;
      padding: 32px 0;
    }
    .logout-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 10px;
      border: 1px solid rgba(255,61,110,0.3);
      background: rgba(255,61,110,0.08);
      color: rgba(255,61,110,0.8);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: rgba(255,61,110,0.2);
      border-color: rgba(255,61,110,0.6);
      color: #fff;
    }

    @media (max-width: 640px) {
      .profile-stats-row { grid-template-columns: repeat(2,1fr); }
      .profile-name { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="page-transition-overlay"></div>
<div class="global-doodles" aria-hidden="true">
  <svg class="gdoodle gd1" width="72" height="72" viewBox="0 0 72 72" fill="none"><circle cx="36" cy="36" r="33" stroke="#fff" stroke-width="1.2" stroke-dasharray="7 5"></circle></svg>
  <svg class="gdoodle gd2" width="88" height="88" viewBox="0 0 88 88" fill="none"><rect x="6" y="6" width="76" height="76" rx="8" stroke="#fff" stroke-width="1" stroke-dasharray="8 5"></rect></svg>
</div>

<video class="bg-video" autoplay loop muted playsinline><source src="../background.mp4" type="video/mp4"></video>
<canvas id="webgl-bg"></canvas>
<div class="bg-overlay"></div>

<div class="di-wrapper"></div>

<div class="subpage-wrap">
  <div class="profile-wrap">
    <div class="page-hero reveal" style="padding-bottom:20px">
      <span class="page-hero-tag">// YOUR IDENTITY</span>
      <h1>YOUR <span class="text-gradient">PROFILE</span></h1>
    </div>

    <!-- Profile Card -->
    <div class="profile-card reveal" id="profile-card">
      <div class="profile-banner"></div>
      <div class="profile-body">
        <div id="profile-content">
          <!-- filled by JS -->
          <div style="display:flex;align-items:center;justify-content:center;padding:40px;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.3)">
            <span class="btn-spinner" style="width:20px;height:20px;border-width:2px;margin-right:12px"></span>
            LOADING PROFILE...
          </div>
        </div>
      </div>
    </div>

    <!-- Download History -->
    <div class="history-card reveal" style="margin-bottom:20px">
      <div class="history-title">// DOWNLOAD HISTORY</div>
      <div id="dl-history">
        <div class="history-empty">No downloads yet. Visit the <a href="store.html" style="color:var(--accent)">Store</a> to get started.</div>
      </div>
    </div>

    <!-- Logout -->
    <div class="reveal" style="margin-top:8px">
      <button class="logout-btn" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        DISCONNECT DISCORD
      </button>
    </div>
  </div>
</div>

<style>
  .btn-spinner {
    display:inline-block;width:10px;height:10px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin 0.7s linear infinite;vertical-align:middle;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>

<script src="../shared.js"></script>
<script src="../ocean.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Handle OAuth callback (user just came back from Discord)
  if (window.location.hash.includes('access_token')) {
    DiscordAuth.handleCallback().then(user => {
      if (user) { history.replaceState(null,'',window.location.pathname); renderProfile(user); }
    });
    return;
  }

  buildNav('profile');

  const user = DiscordAuth.getUser();
  if (!user) {
    showDiscordAuthScreen();
    return;
  }
  renderProfile(user);
  renderHistory();
});

function renderProfile(user) {
  const avatarUrl = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
    : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || '0') % 5}.png`;

  const joinYear = new Date().getFullYear();
  const downloads = JSON.parse(localStorage.getItem('sh_downloads') || '[]');

  document.getElementById('profile-content').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div class="profile-name">${(user.global_name || user.username || 'VAULT MEMBER').toUpperCase()}</div>
        <div class="profile-discrim">@${user.username || user.id}</div>
        <span class="profile-badge">
          <svg width="12" height="9" viewBox="0 0 22 16" fill="currentColor"><path d="M18.59 1.34A18.18 18.18 0 0 0 14.07 0c-.19.35-.41.82-.56 1.19a16.8 16.8 0 0 0-5.02 0C8.34.82 8.11.35 7.92 0A18.14 18.14 0 0 0 3.4 1.35 19.2 19.2 0 0 0 .06 14.02 18.28 18.28 0 0 0 5.62 16c.44-.6.84-1.24 1.18-1.91a11.91 11.91 0 0 1-1.87-.9c.16-.11.31-.23.45-.35a13.02 13.02 0 0 0 11.23 0c.15.12.3.24.46.35-.6.35-1.23.65-1.88.91.34.67.73 1.31 1.18 1.9a18.24 18.24 0 0 0 5.57-1.98A19.18 19.18 0 0 0 18.59 1.34Z"/></svg>
          VAULT MEMBER
        </span>
      </div>
      <img src="${avatarUrl}" class="profile-avatar"
        onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="Avatar">
    </div>

    <div class="profile-stats-row">
      <div class="profile-stat">
        <span class="profile-stat-num">${downloads.length}</span>
        <span class="profile-stat-lbl">Downloads</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num">0</span>
        <span class="profile-stat-lbl">Fixes Applied</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num">0</span>
        <span class="profile-stat-lbl">Requests</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num">${joinYear}</span>
        <span class="profile-stat-lbl">Member Since</span>
      </div>
    </div>
  `;

  // Also update avatar in banner
  const banner = document.querySelector('.profile-banner');
  if (banner) {
    banner.style.background = `
      linear-gradient(135deg,rgba(88,101,242,0.25),rgba(255,106,0,0.1),rgba(255,61,110,0.15)),
      url('https://cdn.discordapp.com/banners/${user.id}/${user.banner}.png?size=480') center/cover
    `;
  }
}

function renderHistory() {
  const downloads = JSON.parse(localStorage.getItem('sh_downloads') || '[]');
  const container = document.getElementById('dl-history');

  if (!downloads.length) return;

  container.innerHTML = downloads.slice().reverse().slice(0,20).map(d => `
    <div class="history-item">
      <img class="history-img"
        src="https://cdn.cloudflare.steamstatic.com/steam/apps/${d.appId}/header.jpg"
        onerror="this.style.opacity='0.3'"
        alt="${d.name}">
      <div style="flex:1;min-width:0">
        <div class="history-game-name">${d.name || d.appId}</div>
        <div class="history-date">${d.date}</div>
      </div>
      <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:rgba(74,222,128,0.8);text-transform:uppercase">✓ Downloaded</span>
    </div>
  `).join('');
}

function doLogout() {
  if (confirm('Disconnect Discord and leave the Vault?')) {
    DiscordAuth.logout();
    window.location.href = '../index.html';
  }
}
</script>
</body>
</html>
