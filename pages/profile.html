<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — STRAW HAT</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../extras.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-transition-overlay"></div>
<div class="global-doodles" aria-hidden="true"></div>

<nav class="nav-main">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">STRAW<span>HAT</span></a>
    <div class="nav-links">
      <a href="store.html">Store</a>
      <a href="drops.html">Drops</a>
      <a href="fixes.html">Fixes</a>
      <a href="request.html">Request</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </div>
</nav>

<div class="container" style="padding-top: 120px; min-height: 80vh; position: relative; z-index: 1;">
  
  <div id="auth-view" style="text-align: center; margin-top: 10vh;">
    <h1 class="display-font" style="font-size: 64px; margin-bottom: 20px;">ACCESS <span class="text-accent">VAULT</span></h1>
    <p class="text-dim mb-32">Secure authentication required to manage your downloads and requests.</p>
    <a href="https://steam-dx4q.onrender.com/auth/login" class="btn-main-dl" style="padding: 16px 40px; font-size: 16px; cursor: pointer;">
      LOGIN WITH DISCORD
    </a>
  </div>

  <div id="profile-view" style="display: none;">
    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 50px;">
      <img id="profile-avatar" src="../icon.png" style="width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow);">
      <div>
        <h1 class="display-font" id="profile-username" style="font-size: 56px; margin:0; line-height:1;">USER</h1>
        <div class="pill orange mt-8" id="tier-badge">VERIFIED MEMBER</div>
        <button onclick="logoutSession()" class="btn-main-dl mt-16" style="padding: 8px 20px; font-size: 12px; background: transparent; border: 1px solid var(--accent2);">LOGOUT</button>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
      <div class="fix-card visible">
        <h3 class="section-tag mb-16">Vault History</h3>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
          <span class="text-dim">Total Downloads: <span id="stat-games" class="text-accent" style="font-weight:700">0</span></span>
        </div>
        <div id="history-list" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
      
      <div class="fix-card visible">
        <h3 class="section-tag mb-16">Applied Fixes</h3>
        <div id="applied-list" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
    </div>
  </div>
</div>

<script src="../shared.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const session = getSession();
    const authView = document.getElementById('auth-view');
    const profileView = document.getElementById('profile-view');

    if (session) {
      authView.style.display = 'none';
      profileView.style.display = 'block';
      document.getElementById('profile-username').textContent = session.username.toUpperCase();
      if(session.avatar) {
        document.getElementById('profile-avatar').src = `https://cdn.discordapp.com/avatars/${session.id}/${session.avatar}.png`;
      }
      
      // Load standard history
      const history = get(KEYS.history) || [];
      const applied = get(KEYS.applied) || [];
      document.getElementById('stat-games').textContent = history.length;
      document.getElementById('tier-badge').textContent = session.isStaff ? 'STRAWHAT STAFF' : (history.length > 5 ? 'ELITE VANGUARD' : 'VERIFIED MEMBER');

      document.getElementById('history-list').innerHTML = history.length ? history.map(h => `<div style="padding:12px; background:var(--glass); border-radius:8px; border:1px solid var(--glass-border); font-family:var(--font-mono); font-size:12px; display:flex; justify-content:space-between;"><span>${h.name}</span><span class="text-dim">${new Date(h.date).toLocaleDateString()}</span></div>`).join('') : '<span class="text-dim">No downloads yet.</span>';
      
      document.getElementById('applied-list').innerHTML = applied.length ? applied.map(a => `<div style="padding:12px; background:var(--glass); border-radius:8px; border:1px solid var(--glass-border); font-family:var(--font-mono); font-size:12px; color:var(--accent3);">✓ ${a}</div>`).join('') : '<span class="text-dim">No fixes applied yet.</span>';
    } else {
      authView.style.display = 'block';
      profileView.style.display = 'none';
    }
  });
</script>
</body>
</html>
